name: Kali RDP with ngrok

on:
  workflow_dispatch:   # Aap manually trigger kar sakte hain

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kalilinux/kali-rolling
      options: --privileged   # Systemd aur service ke liye chahiye
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update and install XRDP + XFCE4
        run: |
          apt-get update -y
          apt-get install -y kali-desktop-xfce xorg xrdp sudo curl wget
          # Create a user for RDP login
          useradd -m -s /bin/bash kali
          echo "kali:Kaligithub@123" | chpasswd
          usermod -aG sudo kali
          # Configure XFCE as default session
          echo "startxfce4" > /home/kali/.xsession
          chown kali:kali /home/kali/.xsession
          # Start XRDP service (in background)
          service dbus start
          service xrdp start
          # Allow RDP port
          sed -i 's/port=3389/port=3389/g' /etc/xrdp/xrdp.ini

      - name: Download ngrok
        run: |
          wget https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar xvzf ngrok-v3-stable-linux-amd64.tgz
          chmod +x ngrok

      - name: Expose RDP port via ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ./ngrok authtoken $NGROK_AUTH_TOKEN
          # Run ngrok TCP tunnel on port 3389
          ./ngrok tcp 3389 &
          sleep 5
          # Fetch the public URL
          curl -s http://localhost:4040/api/tunnels | grep -o '"public_url":"[^"]*' | grep -o 'tcp://[^"]*'

      - name: Keep job alive (6 hours max)
        run: |
          echo "✅ RDP is ready! Connect using the ngrok address above."
          echo "Username: kali"
          echo "Password: Kaligithub@123"
          echo "The runner will stay alive for 6 hours. Press Ctrl+C to stop early if running locally."
          # Keep the job running so you can connect
          tail -f /dev/null
